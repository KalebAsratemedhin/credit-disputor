openapi: 3.0.3
info:
  title: Credit Disputor API
  version: 1.0.0
  description: |
    Backend API with health checks, email/password sign-in (password then MFA via `mfaToken`: email OTP, TOTP, backup code, or WebAuthn passkey),
    optional Google sign-in (POST /auth/google, tokens without MFA), SMS phone verification via Twilio Verify,
    and authenticated `/v1` APIs (profile, password, avatar, preferences, phone verify, TOTP, backup codes, WebAuthn).
    `GET /auth/me` and `GET /v1/me` return the same user shape including `avatarUrl`.

servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /health:
    get:
      summary: Liveness check
      tags: [Health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /health/db:
    get:
      summary: Database connectivity check
      tags: [Health]
      responses:
        "200":
          description: Database reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  database:
                    type: string
                    example: connected
        "503":
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/signup:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: |
            Created — sends email OTP; phone is stored as E.164 with `phoneVerified: false`.
            After `POST /auth/verify-email` (session tokens), complete phone verification with Bearer auth:
            `POST /v1/phone/send-verification` then `POST /v1/phone/verify`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupPendingResponse"
        "400":
          description: Validation error (including invalid phone number)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorBody"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/signin:
    post:
      summary: Sign in with email and password (MFA step follows)
      description: |
        On success returns a step-up `mfaToken` (not session tokens). For the next calls, set
        **`Authorization: Bearer <mfaToken>`** on `POST /auth/signin/send-code` (optional email OTP),
        `POST /auth/signin/resend-code`, `POST /auth/signin/mfa/verify`, and (when `mfaMethods.webauthn` is true)
        `POST /auth/signin/webauthn/authentication-options` then `POST /auth/signin/webauthn/authentication-verify`.
        Use the **mfaBearer** scheme in Swagger UI.
        `POST /auth/google` does not use this flow.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SigninRequest"
      responses:
        "200":
          description: |
            MFA required. Use the returned `mfaToken` value as **`Authorization: Bearer <mfaToken>`**
            on send-code, resend-code, mfa/verify, and WebAuthn sign-in endpoints (see **mfaBearer**).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SigninMfaRequiredResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorBody"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "403":
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/signin/send-code:
    post:
      summary: Send 4-digit email OTP for password sign-in MFA
      description: |
        Requires **`Authorization: Bearer <mfaToken>`** where `mfaToken` is the JWT from `POST /auth/signin`.
        This is **not** the same as the session `accessToken` issued after MFA completes.
      tags: [Auth]
      security:
        - mfaBearer: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkAckResponse"
        "401":
          description: |
            Missing or empty `Authorization: Bearer` (e.g. `UNAUTHORIZED` / "Sign-in verification token required."),
            invalid/expired `mfaToken` (`MFA_TOKEN_INVALID`), or wrong token type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/signin/resend-code:
    post:
      summary: Resend sign-in MFA email OTP (same as send-code)
      description: |
        Same as send-code: **`Authorization: Bearer <mfaToken>`** (JWT from `POST /auth/signin`, not `accessToken`).
      tags: [Auth]
      security:
        - mfaBearer: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkAckResponse"
        "401":
          description: |
            Missing or empty `Authorization: Bearer`, invalid/expired `mfaToken`, or wrong token type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/signin/mfa/verify:
    post:
      summary: Complete password sign-in MFA (email OTP, TOTP, or backup code; passkeys use WebAuthn endpoints)
      description: |
        Requires **`Authorization: Bearer <mfaToken>`** (same step-up JWT from `POST /auth/signin` as send-code/resend-code).
        Request body carries `kind` and `code`. On success, response is normal session tokens (`accessToken`, `refreshToken`).
      tags: [Auth]
      security:
        - mfaBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SigninMfaVerifyRequest"
      responses:
        "200":
          description: OK — session tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation or wrong code / MFA not available for chosen kind
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorBody"
                  - $ref: "#/components/schemas/ErrorBody"
        "401":
          description: |
            Missing/empty Bearer `mfaToken`, or invalid/expired step-up JWT. Use `mfaToken` from sign-in, not `accessToken`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/signin/webauthn/authentication-options:
    post:
      summary: Passkey sign-in MFA — get WebAuthn assertion options
      description: |
        Requires **`Authorization: Bearer <mfaToken>`**. Returns `PublicKeyCredentialRequestOptionsJSON` for `@simplewebauthn/browser` `startAuthentication()`.
        Only valid when the user has registered passkeys (`mfaMethods.webauthn`). Then call **`POST /auth/signin/webauthn/authentication-verify`** with the assertion.
      tags: [Auth]
      security:
        - mfaBearer: []
      responses:
        "200":
          description: WebAuthn authentication options (JSON for the browser API)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: No passkeys registered (`WEBAUTHN_NOT_AVAILABLE`) or other error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing/invalid `mfaToken`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/signin/webauthn/authentication-verify:
    post:
      summary: Passkey sign-in MFA — verify assertion and issue session tokens
      description: |
        Requires **`Authorization: Bearer <mfaToken>`**. Body is the `AuthenticationResponseJSON` from the browser after `startAuthentication()`.
      tags: [Auth]
      security:
        - mfaBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebAuthnAuthenticationVerifyRequest"
      responses:
        "200":
          description: OK — session tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation, invalid/expired challenge, or verification failed
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorBody"
                  - $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing/invalid `mfaToken`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/google:
    post:
      summary: Sign in or sign up with Google (ID token from Google Identity Services)
      description: Issues session tokens in one step; no post-login MFA (unlike email/password sign-in).
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleSignInRequest"
      responses:
        "200":
          description: OK — same tokens as email sign-in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorBody"
        "401":
          description: Invalid Google credential
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          description: Google account conflict for this email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "503":
          description: Google sign-in not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/verify-email:
    post:
      summary: Verify email after signup (signup verification code)
      description: |
        Confirms the account email using the 4-digit code sent after **`POST /auth/signup`**. This is **not** sign-in MFA
        (that flow uses `/auth/signin/send-code` and `/auth/signin/mfa/verify`).
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: OK — session tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation or invalid OTP
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorBody"
                  - $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Unknown user (generic)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/resend-email-verification:
    post:
      summary: Resend signup email verification code
      description: Resends the signup email verification code; does not resend sign-in MFA codes.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendEmailVerificationRequest"
      responses:
        "200":
          description: Always OK (no enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkAckResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/forgot-password:
    post:
      summary: Request password reset email
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Generic acknowledgment (always same message)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/reset-password:
    post:
      summary: Complete password reset with token from email link
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordSuccessResponse"
        "400":
          description: Validation or invalid/expired token
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorBody"
                  - $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/refresh:
    post:
      summary: Exchange refresh token for new access and refresh tokens
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorBody"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /auth/me:
    get:
      summary: Current user (requires Bearer token)
      description: Same `user` shape as `GET /v1/me` (includes `avatarUrl`).
      tags: [Auth]
      security:
        - bearerJwt: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/me:
    get:
      summary: Current user profile (Bearer)
      tags: [Settings]
      security:
        - bearerJwt: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    patch:
      summary: Update profile (fullName and/or phoneNumber)
      description: Changing `phoneNumber` normalizes to E.164, sets `phoneVerified` to false, and sends a new SMS verification when Twilio is enabled.
      tags: [Settings]
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/phone/send-verification:
    post:
      summary: Start or resend SMS phone verification (Bearer)
      description: |
        Requires session **`accessToken`**. Use after signup/email verify or when `phoneVerified` is false.
        No-op if already verified or no phone. `TWILIO_VERIFY_PROVIDER=console` accepts code **000000**.
      tags: [Settings]
      security:
        - bearerJwt: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkAckResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "503":
          description: Twilio not configured or send failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/phone/verify:
    post:
      summary: Verify phone with SMS code (Bearer)
      tags: [Settings]
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPhoneCodeOnlyRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyPhoneResponse"
        "400":
          description: Validation or invalid code
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorBody"
                  - $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: User not found or no phone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/me/preferences:
    get:
      summary: Privacy and notification preferences (Bearer)
      description: |
        Returns the application preference catalog merged with this user's stored overrides (`UserPreference` rows keyed by slug).
        Title, description, and defaults come from server code (`backend/src/lib/preferences/catalog.ts`).
      tags: [Settings]
      security:
        - bearerJwt: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    patch:
      summary: Update preferences by key (Bearer)
      description: |
        Body is a map of preference `key` (string) to boolean. Only keys defined in the server catalog are accepted.
      tags: [Settings]
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchPreferencesRequest"
      responses:
        "200":
          description: OK — same shape as GET
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesResponse"
        "400":
          description: Validation error (unknown keys, empty body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/me/password:
    post:
      summary: Change password (invalidates refresh tokens)
      tags: [Settings]
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkAckResponse"
        "400":
          description: Validation or business rule (e.g. current password required/wrong)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorBody"
                  - $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/me/avatar:
    post:
      summary: Upload avatar image (multipart field `avatar`)
      tags: [Settings]
      security:
        - bearerJwt: []
      requestBody:
        required: true
        description: |
          **Required:** multipart field `avatar` (file). **Optional:** none.
          Accepted types: JPEG, PNG, WebP. Max size 5 MiB.
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
                  description: Image file (JPEG, PNG, or WebP; max 5 MiB).
      responses:
        "200":
          description: OK — returns updated user and public avatar URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarUploadResponse"
        "400":
          description: |
            Missing multipart file or validation failure: `AVATAR_REQUIRED` when the `avatar` part is absent.
            Unsupported image MIME (e.g. SVG) → `INVALID_AVATAR_TYPE` with message listing JPEG, PNG, WebP.
            File over size limit → Multer `FILE_TOO_LARGE`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/security/status:
    get:
      summary: MFA / WebAuthn summary for the current user
      tags: [Security]
      security:
        - bearerJwt: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityStatusResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/security/totp/setup:
    post:
      summary: Start TOTP enrollment (returns otpauth URL and secret; not enabled until verify)
      tags: [Security]
      security:
        - bearerJwt: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpSetupResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          description: TOTP already enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/security/totp/verify:
    post:
      summary: Confirm TOTP code and enable MFA (returns one-time backup codes)
      tags: [Security]
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpVerifyRequest"
      responses:
        "200":
          description: OK — save `backupCodes` securely; shown once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupCodesResponse"
        "400":
          description: Validation or invalid code
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorBody"
                  - $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/security/totp:
    delete:
      summary: Disable TOTP and remove backup codes
      tags: [Security]
      security:
        - bearerJwt: []
      responses:
        "204":
          description: Disabled
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/security/backup-codes/regenerate:
    post:
      summary: Regenerate backup codes (requires TOTP enabled; invalidates previous codes)
      tags: [Security]
      security:
        - bearerJwt: []
      responses:
        "200":
          description: OK — save `backupCodes` securely; shown once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupCodesResponse"
        "400":
          description: TOTP not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/security/webauthn/register/options:
    post:
      summary: Begin passkey registration (WebAuthn creation options)
      tags: [Security]
      security:
        - bearerJwt: []
      responses:
        "200":
          description: Pass to `@simplewebauthn/browser` startRegistration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebauthnRegistrationOptions"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/security/webauthn/register/verify:
    post:
      summary: Complete passkey registration with attestation response
      tags: [Security]
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebauthnRegisterVerifyRequest"
      responses:
        "201":
          description: Credential stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkAckResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorBody"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/security/webauthn/credentials:
    get:
      summary: List registered passkeys (id, nickname, createdAt)
      tags: [Security]
      security:
        - bearerJwt: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebauthnCredentialsListResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/security/webauthn/credentials/{id}:
    delete:
      summary: Remove a passkey by credential row id
      tags: [Security]
      security:
        - bearerJwt: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: |
            **Required.** Passkey row id from `GET /v1/security/webauthn/credentials` (`credentials[].id`).
      responses:
        "204":
          description: Deleted
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

components:
  securitySchemes:
    bearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT from signup, signin MFA verify, or refresh (`accessToken`).
    mfaBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        **Sign-in step-up token (not the session access token).**

        After `POST /auth/signin`, copy the `mfaToken` string from the response and authorize these requests with the standard HTTP header:

        `Authorization: Bearer <mfaToken>`

        Use this scheme for `POST /auth/signin/send-code`, `POST /auth/signin/resend-code`, `POST /auth/signin/mfa/verify`,
        `POST /auth/signin/webauthn/authentication-options`, and `POST /auth/signin/webauthn/authentication-verify` only.
        Do not use `accessToken` here. In Swagger UI, click **Authorize**, choose this scheme, and paste **only** the JWT value (the UI adds the `Bearer ` prefix).

  schemas:
    PublicUser:
      type: object
      description: User profile fields returned by auth and `/v1/me` endpoints.
      properties:
        id:
          type: string
          description: User id (cuid).
        email:
          type: string
          format: email
        fullName:
          type: string
          description: Display name.
        phoneNumber:
          type: string
          nullable: true
          description: E.164 when set.
        avatarUrl:
          type: string
          nullable: true
          description: Absolute URL when set (from avatar upload).
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, email, fullName, avatarUrl, emailVerified, phoneVerified, createdAt, updatedAt]

    SignupRequest:
      type: object
      description: |
        **Required:** `email`, `password`, `fullName`, `phoneNumber`. Creates an unverified account and sends a signup email code.
      required: [email, password, fullName, phoneNumber]
      properties:
        email:
          type: string
          format: email
          description: Account email (must not already be registered).
        password:
          type: string
          description: Minimum 8 characters.
        fullName:
          type: string
          description: Non-empty display name.
        phoneNumber:
          type: string
          description: Parsed with server default region; stored as E.164 when valid.

    VerifyPhoneCodeOnlyRequest:
      type: object
      description: |
        **Required:** `code`. Digits-only SMS code from Twilio Verify (length depends on provider; dev console accepts `000000`).
      required: [code]
      properties:
        code:
          type: string
          description: Numeric verification code from SMS.

    VerifyPhoneResponse:
      type: object
      required: [ok, user]
      properties:
        ok:
          type: boolean
          enum: [true]
        user:
          $ref: "#/components/schemas/PublicUser"

    SigninRequest:
      type: object
      description: |
        **Required:** `email`, `password`. Returns MFA step-up (`mfaToken`); not session tokens until MFA completes.
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          description: Account password.

    GoogleSignInRequest:
      type: object
      description: |
        **Required:** `idToken`. One-step sign-in; no post-login MFA (unlike email/password).
      required: [idToken]
      properties:
        idToken:
          type: string
          description: ID token (JWT) from Google Identity Services after GIS sign-in.

    RefreshRequest:
      type: object
      description: |
        **Required:** `refreshToken` from a prior `AuthResponse`.
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: Opaque refresh token issued with the last access token.

    AuthResponse:
      type: object
      description: Session issued after successful auth (signup verify, MFA verify, Google, or refresh).
      required: [user, accessToken, refreshToken]
      properties:
        user:
          $ref: "#/components/schemas/PublicUser"
        accessToken:
          type: string
          description: JWT for **bearerJwt** on protected routes.
        refreshToken:
          type: string
          description: Opaque token for `POST /auth/refresh`.

    SigninMfaRequiredResponse:
      type: object
      required: [mfaRequired, mfaToken, maskedEmail, mfaMethods]
      properties:
        mfaRequired:
          type: boolean
          enum: [true]
        mfaToken:
          type: string
          description: |
            JWT for the MFA step only. Send as **`Authorization: Bearer <mfaToken>`** on
            `/auth/signin/send-code`, `/auth/signin/resend-code`, `/auth/signin/mfa/verify`, and passkey MFA endpoints under `/auth/signin/webauthn/`.
            Do not confuse with `accessToken` (issued only after successful MFA).
        maskedEmail:
          type: string
        mfaMethods:
          $ref: "#/components/schemas/MfaMethods"

    MfaMethods:
      type: object
      required: [emailOtp, totp, backupCode, webauthn]
      properties:
        emailOtp:
          type: boolean
          description: Always true; email OTP is always offered after password.
        totp:
          type: boolean
        backupCode:
          type: boolean
        webauthn:
          type: boolean
          description: True when the user has at least one registered passkey; use WebAuthn authentication-options/verify endpoints.

    SigninMfaVerifyRequest:
      type: object
      description: |
        **Required:** `kind`, `code`. Requires `Authorization: Bearer <mfaToken>` from `POST /auth/signin` (see **mfaBearer**).
      required: [kind, code]
      properties:
        kind:
          type: string
          enum: [email_otp, totp, backup_code]
          description: |
            MFA channel: `email_otp` (email code), `totp` (authenticator app), `backup_code` (one-time backup code).
        code:
          type: string
          description: Code for the selected `kind` (email OTP, TOTP, or backup code format per server).

    SignupPendingResponse:
      type: object
      required: [user, verificationRequired]
      properties:
        user:
          $ref: "#/components/schemas/PublicUser"
        verificationRequired:
          type: boolean
          enum: [true]

    VerifyEmailRequest:
      type: object
      description: |
        **Required:** `email`, `code`. Confirms signup using the code emailed after `POST /auth/signup`.
      required: [email, code]
      properties:
        email:
          type: string
          format: email
          description: Same email used at signup.
        code:
          type: string
          description: 4-digit code from the signup verification email.

    ResendEmailVerificationRequest:
      type: object
      description: |
        **Required:** `email`. Resends signup verification email (always 200; no account enumeration).
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Email that may have a pending signup.

    WebAuthnAuthenticationVerifyRequest:
      type: object
      description: |
        **Required:** `id`, `rawId`, `type`, `response`. Browser `AuthenticationResponseJSON` after `startAuthentication()`.
        Extra properties allowed (passthrough). Requires **mfaBearer**.
      required: [id, rawId, type, response]
      properties:
        id:
          type: string
          description: Credential id (base64url).
        rawId:
          type: string
          description: Raw credential id (base64url).
        type:
          type: string
          enum: [public-key]
          description: Must be `public-key`.
        response:
          type: object
          description: Authenticator assertion payload from the browser.
          required: [clientDataJSON, authenticatorData, signature]
          properties:
            clientDataJSON:
              type: string
              description: |
                Required in `response`. Client data JSON (base64url).
            authenticatorData:
              type: string
              description: |
                Required in `response`. Authenticator data (base64url).
            signature:
              type: string
              description: |
                Required in `response`. Assertion signature (base64url).
            userHandle:
              type: string
              description: Optional. User handle if returned by the authenticator.
        clientExtensionResults:
          type: object
          description: Optional. Extension results from the browser.
          additionalProperties: true
      additionalProperties: true

    OkAckResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    ForgotPasswordRequest:
      type: object
      description: |
        **Required:** `email`. Triggers reset email if an account exists (response does not reveal whether email exists).
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Account email to send reset instructions to.

    ForgotPasswordResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ResetPasswordRequest:
      type: object
      description: |
        **Required:** `token`, `password`, `confirmPassword`. `password` and `confirmPassword` must match; minimum password length 8.
      required: [token, password, confirmPassword]
      properties:
        token:
          type: string
          description: Opaque token from the password-reset email link.
        password:
          type: string
          description: New password (min 8 characters).
        confirmPassword:
          type: string
          description: Must match `password`.

    ResetPasswordSuccessResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    MeResponse:
      type: object
      description: |
        Top-level **required** field: `user`. Same profile shape for `GET /auth/me` and `GET /v1/me`.
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/PublicUser"

    PatchMeRequest:
      type: object
      description: |
        **At least one of** `fullName` or `phoneNumber` must be sent. Both fields are optional individually; omitting both is invalid.
        Sending a new `phoneNumber` re-verifies phone (SMS) when Twilio is enabled.
      properties:
        fullName:
          type: string
          description: Optional. New display name (non-empty when provided).
        phoneNumber:
          nullable: true
          type: string
          description: Optional. New phone (parsed to E.164) or `null` to clear.

    ChangePasswordRequest:
      type: object
      description: |
        **Required:** `newPassword`, `confirmPassword` (must match each other, min 8 characters).
        **Optional:** `currentPassword` — required when the user has a password; omit for OAuth-only accounts where applicable.
      required: [newPassword, confirmPassword]
      properties:
        currentPassword:
          type: string
          description: Optional. Current password when the account has one.
        newPassword:
          type: string
          description: New password (min 8 characters).
        confirmPassword:
          type: string
          description: Must match `newPassword`.

    TotpVerifyRequest:
      type: object
      description: |
        **Required:** `code`. Completes TOTP enrollment after `POST /v1/security/totp/setup`.
      required: [code]
      properties:
        code:
          type: string
          description: 6-digit TOTP code from the authenticator app.

    WebauthnRegisterVerifyRequest:
      type: object
      description: |
        **Required:** `nickname`, `response`. `response` is the browser registration JSON after `startRegistration()`.
      required: [nickname, response]
      properties:
        nickname:
          type: string
          description: User-visible label for this passkey (1–120 characters).
        response:
          type: object
          description: Registration response JSON from `@simplewebauthn/browser` / Web API.
          additionalProperties: true

    SecurityStatusResponse:
      type: object
      required: [totpEnabled, backupCodesRemaining, webauthnCredentialCount]
      properties:
        totpEnabled:
          type: boolean
        backupCodesRemaining:
          type: integer
          minimum: 0
        webauthnCredentialCount:
          type: integer
          minimum: 0

    TotpSetupResponse:
      type: object
      required: [otpauthUrl, secretBase32]
      properties:
        otpauthUrl:
          type: string
        secretBase32:
          type: string

    BackupCodesResponse:
      type: object
      required: [backupCodes]
      properties:
        backupCodes:
          type: array
          description: One-time backup codes (eight digits each), shown once — store securely.
          items:
            type: string
            description: Eight-digit numeric code.

    WebauthnCredentialSummary:
      type: object
      required: [id, nickname, createdAt]
      properties:
        id:
          type: string
        nickname:
          type: string
        createdAt:
          type: string
          format: date-time

    WebauthnCredentialsListResponse:
      type: object
      required: [credentials]
      properties:
        credentials:
          type: array
          items:
            $ref: "#/components/schemas/WebauthnCredentialSummary"

    AvatarUploadResponse:
      type: object
      required: [user, avatarUrl]
      properties:
        user:
          $ref: "#/components/schemas/PublicUser"
        avatarUrl:
          type: string

    PreferenceItem:
      type: object
      required: [key, title, description, value]
      properties:
        key:
          type: string
          description: Stable slug (e.g. `emailMarketing`)
        title:
          type: string
        description:
          type: string
        value:
          type: boolean

    PreferencesResponse:
      type: object
      required: [privacy, notifications, updatedAt]
      properties:
        privacy:
          type: array
          items:
            $ref: "#/components/schemas/PreferenceItem"
        notifications:
          type: object
          required: [email, push]
          properties:
            email:
              type: array
              items:
                $ref: "#/components/schemas/PreferenceItem"
            push:
              type: array
              items:
                $ref: "#/components/schemas/PreferenceItem"
        updatedAt:
          type: string
          format: date-time

    PatchPreferencesRequest:
      type: object
      minProperties: 1
      additionalProperties:
        type: boolean
      description: |
        Map of preference **key → boolean**. **Required:** at least one key.
        Keys must be valid slugs from the catalog returned by `GET /v1/me/preferences` (unknown keys are rejected).
        Example: `{ "emailMarketing": false, "pushBrowserNotifications": true }`.

    WebauthnRegistrationOptions:
      type: object
      description: PublicKeyCredentialCreationOptionsJSON shape from @simplewebauthn/server generateRegistrationOptions
      additionalProperties: true

    ErrorBody:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
        details:
          description: Optional structured data (business errors).
          type: object

    ValidationErrorBody:
      type: object
      required: [message, code, details]
      properties:
        message:
          type: string
          description: Summary mentioning affected fields.
        code:
          type: string
          example: VALIDATION_ERROR
        details:
          description: Zod flatten shape (fieldErrors, formErrors).
          type: object

tags:
  - name: Health
  - name: Auth
  - name: Settings
    description: Authenticated profile, password, avatar, and preferences (`/v1/me`, `/v1/me/preferences`)
  - name: Security
    description: TOTP, backup codes, and WebAuthn passkeys (`/v1/security`)
